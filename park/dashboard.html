<!DOCTYPE html>
<html lang="en">

<head>
    <script>
        if (localStorage.getItem('parkease_admin_logged') !== 'true') {
            window.location.href = 'login.html';
        }
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Allotment Control — ParkEase</title>
    <link rel="stylesheet" href="assets/css/dashboard.css" />
</head>

<body>
    <div class="bg-blobs">
        <div class="blob"></div>
        <div class="blob"></div>
    </div>
    <div class="noise"></div>
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar(false)"></div>
    <div id="dashboard">
        <!-- SIDEBAR -->
        <aside class="d-sidebar" id="sidebar">
            <div class="d-logo-wrap">
                <div class="d-logo-box">P</div>
                <div class="d-logo-name">Park<span>Ease</span></div>
            </div>
            <nav class="d-nav">
                <a href="overview.html" class="d-nav-item">
                    <span class="d-nav-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg></span>
                    Insights
                </a>
                <a href="dashboard.html" class="d-nav-item">
                    <span class="d-nav-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3h18v18H3z"></path><path d="M9 3v18M15 3v18M3 9h18M3 15h18"></path></svg></span>
                    Slot Allotment
                </a>
                <a href="users.html" class="d-nav-item">
                    <span class="d-nav-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg></span>
                    Staff & Users
                </a>
                <a href="payments.html" class="d-nav-item">
                    <span class="d-nav-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect><line x1="1" y1="10" x2="23" y2="10"></line></svg></span>
                    Revenue
                </a>
                <a href="report.html" class="d-nav-item">
                    <span class="d-nav-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg></span>
                    Strategic Reports
                </a>
                <a href="settings.html" class="d-nav-item">
                    <span class="d-nav-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg></span>
                    System Settings
                </a>
            </nav>
            <div class="d-sidebar-bot">
                <a href="login.html" class="back-btn" onclick="localStorage.removeItem('parkease_admin_logged')">
                    Logout
                </a>
            </div>
        </aside>

        <!-- MAIN -->
        <div class="d-main">
            <!-- TOPBAR -->
            <div class="d-topbar">
                <div class="mobile-toggle" onclick="toggleSidebar(true)">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                </div>
                <div class="d-search">
                    <span class="d-search-ico">🔍</span>
                    <input type="text" placeholder="Filter by slot ID..." oninput="dSearch(this.value)" />
                </div>
                <div class="d-topbar-r">
                    <span class="d-date-lbl" id="dDateLbl"></span>
                </div>
            </div>

            <!-- CONTENT -->
            <div class="d-content">
                <!-- Aurora Slot Recap -->
                <div class="d-slot-recap">
                    <div class="recap-card">
                        <div class="recap-box">
                            <div class="recap-sphere free"></div>
                        </div>
                        <div class="recap-info">
                            <div class="recap-val" id="dAvail">—</div>
                            <div class="recap-lbl">Available</div>
                        </div>
                    </div>
                    <div class="recap-card">
                        <div class="recap-box">
                            <div class="recap-sphere occupied"></div>
                        </div>
                        <div class="recap-info">
                            <div class="recap-val" id="dOcc">—</div>
                            <div class="recap-lbl">Occupied</div>
                        </div>
                    </div>
                    <div class="recap-card">
                        <div class="recap-box">
                            <div class="recap-sphere selected"></div>
                        </div>
                        <div class="recap-info">
                            <div class="recap-val" id="dSel">0</div>
                            <div class="recap-lbl">Selected</div>
                        </div>
                    </div>
                    <div class="recap-card">
                        <div class="recap-box">
                            <div class="recap-sphere total"></div>
                        </div>
                        <div class="recap-info">
                            <div class="recap-val" id="dTotal">—</div>
                            <div class="recap-lbl">Capacity</div>
                        </div>
                    </div>
                </div>

                <!-- Quantum Prismatic Grid Section -->
                <div class="quantum-card">
                    <div class="quantum-beam"></div>
                    
                    <div class="quantum-hdr">
                        <h2 class="quantum-title">CENTRAL HUB — LEVEL B2</h2>
                        <div class="quantum-sub">QUANTUM PRISMATIC GRID • LATENCY < 1MS</div>
                    </div>

                    <div class="quantum-grid-wrap">
                        <div class="parking-grid" id="dZonesGrid">
                            <!-- Slots will be rendered here by dashboard.js -->
                        </div>
                    </div>

                    <div class="quantum-sep"></div>

                    <div class="quantum-ftr">
                        <div class="q-stat">
                            <div class="q-val open" id="qOpen">8</div>
                            <div class="q-lbl">OPEN</div>
                        </div>
                        <div class="q-stat">
                            <div class="q-val busy" id="qBusy">0</div>
                            <div class="q-lbl">BUSY</div>
                        </div>
                        <div class="q-stat">
                            <div class="q-val yours" id="qYours">0</div>
                            <div class="q-lbl">YOURS</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- DETAIL PANEL -->
    <div class="d-panel" id="dPanel">
        <div class="d-panel-head">
            <h2 class="d-panel-title" id="dPanelTitle">Slot Allocation</h2>
            <button class="d-panel-close" onclick="dClosePanel()">✕</button>
        </div>
        <div id="dPanelInfo"></div>
        <div id="dPanelActs"></div>
    </div>

    <!-- TOAST -->
    <div class="toast" id="toast"></div>

    <script src="assets/js/dashboard.js"></script>
    <script>
        function toggleSidebar(show) {
            document.getElementById('sidebar').classList.toggle('active', show);
            document.getElementById('sidebarOverlay').classList.toggle('active', show);
        }
    </script>
</body>

</html>
