<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Allotment Control — ParkEase</title>
    <link rel="stylesheet" href="assets/css/dashboard.css" />
</head>

<body>

    <div id="dashboard">
        <!-- SIDEBAR -->
        <aside class="d-sidebar">
            <div class="d-logo-wrap">
                <div class="d-logo-box">P</div>
                <div class="d-logo-name">Park<span>Ease</span></div>
            </div>
            <nav class="d-nav">
                <a href="overview.html" class="d-nav-item">
                    <span class="d-nav-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg></span>
                    Insights
                </a>
                <a href="dashboard.html" class="d-nav-item active">
                    <span class="d-nav-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3h18v18H3z"></path><path d="M9 3v18M15 3v18M3 9h18M3 15h18"></path></svg></span>
                    Slot Allotment
                </a>
                <a href="users.html" class="d-nav-item">
                    <span class="d-nav-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg></span>
                    Staff & Users
                </a>
                <a href="payments.html" class="d-nav-item">
                    <span class="d-nav-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect><line x1="1" y1="10" x2="23" y2="10"></line></svg></span>
                    Revenue
                </a>
            </nav>
            <div class="d-sidebar-bot">
                <a href="index.html" class="back-btn">
                    Logout
                </a>
            </div>
        </aside>

        <!-- MAIN -->
        <div class="d-main">
            <!-- TOPBAR -->
            <div class="d-topbar">
                <div class="d-search">
                    <span class="d-search-ico">🔍</span>
                    <input type="text" placeholder="Filter by slot ID..." oninput="dSearch(this.value)" />
                </div>
                <div class="d-topbar-r">
                    <span class="d-date-lbl" id="dDateLbl"></span>
                </div>
            </div>

            <!-- CONTENT -->
            <div class="d-content">
                <!-- Stats -->
                <div class="d-stats">
                    <div class="d-stat">
                        <div class="d-stat-ico" style="color:var(--green)">🟢</div>
                        <div>
                            <div class="d-stat-n" id="dAvail">—</div>
                            <div class="d-stat-l">Available</div>
                        </div>
                    </div>
                    <div class="d-stat">
                        <div class="d-stat-ico" style="color:var(--red)">🔴</div>
                        <div>
                            <div class="d-stat-n" id="dOcc">—</div>
                            <div class="d-stat-l">Occupied</div>
                        </div>
                    </div>
                    <div class="d-stat">
                        <div class="d-stat-ico" style="color:var(--primary)">🟡</div>
                        <div>
                            <div class="d-stat-n" id="dSel">0</div>
                            <div class="d-stat-l">Selected</div>
                        </div>
                    </div>
                    <div class="d-stat">
                        <div class="d-stat-ico" style="color:var(--blue)">🔵</div>
                        <div>
                            <div class="d-stat-n" id="dTotal">—</div>
                            <div class="d-stat-l">Capacity</div>
                        </div>
                    </div>
                </div>

                <!-- Parking Grid Structure -->
                <div class="parking-container">
                    <div class="parking-entrance">
                        <div class="entrance-label">South-West Entry Gate</div>
                    </div>

                    <div class="parking-grid" id="dZonesGrid"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- DETAIL PANEL -->
    <div class="d-panel" id="dPanel">
        <div class="d-panel-head">
            <h2 class="d-panel-title" id="dPanelTitle">Slot Allocation</h2>
            <button class="d-panel-close" onclick="dClosePanel()">✕</button>
        </div>
        <div id="dPanelInfo"></div>
        <div id="dPanelActs"></div>
    </div>

    <!-- TOAST -->
    <div class="toast" id="toast"></div>

    <script src="assets/js/dashboard.js"></script>
</body>

</html>
