<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instant Pay — ParkEase</title>
    <!-- Outfit for general text, Syne for headers -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/dashboard.css">
    <style>
        :root {
            --p-accent: #8b5cf6; /* Electric Violet */
            --p-success: #10b981; /* Green */
            --p-bg: #0f172a;
            --p-surface: rgba(30, 41, 59, 0.7);
            --p-border: rgba(255, 255, 255, 0.08);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: #020617;
            color: #f1f5f9;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ════ BACKGROUND ════ */
        .p-bg-glow {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: 
                radial-gradient(circle at 0% 0%, rgba(139, 92, 246, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(6, 182, 212, 0.15) 0%, transparent 50%);
        }

        /* ════ NAV ════ */
        .p-nav {
            padding: 24px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--p-border);
        }

        .p-logo {
            font-family: 'Syne', sans-serif;
            font-size: 24px;
            font-weight: 800;
            text-decoration: none;
            color: #fff;
        }
        .p-logo span { color: var(--p-accent); }

        .p-back {
            color: #94a3b8;
            text-decoration: none;
            font-weight: 700;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: color 0.3s;
        }
        .p-back:hover { color: #fff; }

        /* ════ MAIN ════ */
        .p-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .p-card {
            width: 100%;
            max-width: 480px;
            background: var(--p-surface);
            backdrop-filter: blur(30px);
            border: 1px solid var(--p-border);
            border-radius: 32px;
            padding: 32px;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.5);
            animation: pFadeUp 0.6s ease-out;
        }

        @keyframes pFadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .p-hdr {
            text-align: center;
            margin-bottom: 32px;
        }

        .p-title {
            font-family: 'Syne', sans-serif;
            font-size: 28px;
            font-weight: 800;
            margin: 0 0 12px;
        }

        .p-steps {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 24px;
        }

        .p-step {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #4b5563;
        }

        .p-step.active { color: var(--p-accent); }
        .p-step-n {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
        }
        .p-step.active .p-step-n { background: var(--p-accent); color: #fff; }

        /* ════ SCANNER ════ */
        .p-viewport-container {
            position: relative;
            background: #000;
            border-radius: 24px;
            overflow: hidden;
            border: 2px solid rgba(255,255,255,0.03);
            aspect-ratio: 1;
            margin-bottom: 32px;
        }

        #reader {
            width: 100% !important;
            border: none !important;
        }

        .p-guidelines {
            position: absolute;
            inset: 40px;
            border: 2px dashed rgba(255,255,255,0.2);
            border-radius: 20px;
            pointer-events: none;
            z-index: 5;
        }

        .p-status-pill {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            padding: 8px 16px;
            border-radius: 100px;
            font-size: 12px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
            z-index: 10;
        }

        .p-pulse {
            width: 8px;
            height: 8px;
            background: var(--p-accent);
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(2); opacity: 0; }
        }

        /* ════ RESULTS ════ */
        .p-results {
            display: none;
            margin-top: 0;
            animation: pFadeIn 0.4s ease-out;
        }

        @keyframes pFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .p-data {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--p-border);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 24px;
        }

        .p-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            font-size: 14px;
        }
        .p-k { color: #94a3b8; font-weight: 600; }
        .p-v { font-weight: 700; color: #fff; }

        .p-pay-btn {
            background: linear-gradient(135deg, var(--p-accent), #7c3aed);
            color: #fff;
            border: none;
            width: 100%;
            padding: 18px;
            border-radius: 16px;
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 10px 20px rgba(139, 92, 246, 0.3);
            transition: all 0.3s;
        }

        .p-pay-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(139, 92, 246, 0.4);
        }

        /* ════ TOAST ════ */
        .toast {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #fff;
            color: #000;
            padding: 14px 28px;
            border-radius: 100px;
            font-weight: 700;
            font-size: 14px;
            z-index: 2000;
            transition: all 0.4s cubic-bezier(0.2, 1, 0.3, 1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        .toast.show { transform: translateX(-50%) translateY(0); }

        /* QRCode UI Customization */
        #reader__dashboard_section_csr button {
            background: var(--p-accent) !important;
            color: #fff !important;
            border: none !important;
            padding: 12px 20px !important;
            border-radius: 12px !important;
            font-weight: 700 !important;
            cursor: pointer !important;
        }
    </style>
</head>
<body>
    <div class="p-bg-glow"></div>

    <nav class="p-nav">
        <a href="index.html" class="p-logo">Park<span>Ease</span></a>
        <a href="index.html" class="p-back">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            Cancel
        </a>
    </nav>

    <main class="p-main">
        <div class="p-card">
            <div class="p-hdr">
                <div class="p-steps">
                    <div class="p-step active" id="step1">
                        <span class="p-step-n">1</span> SCAN
                    </div>
                    <div class="p-step" id="step2">
                        <span class="p-step-n">2</span> PAY
                    </div>
                </div>
                <h1 class="p-title" id="pageTitle">Point & Pay</h1>
                <p class="p-sub" id="pageSub">Scan your permit's QR code to proceed to checkout.</p>
            </div>

            <div class="p-viewport-container" id="viewport">
                <div class="p-status-pill" id="scanStatus">
                    <span class="p-pulse"></span>
                    AIM CAMERA AT QR CODE
                </div>
                <div class="p-guidelines"></div>
                <div id="reader"></div>
            </div>

            <div class="p-results" id="results">
                <div class="p-data" id="dataRows">
                    <!-- Data populated by JS -->
                </div>
                <button class="p-pay-btn" onclick="proceedToPayment()">
                    Confirm & Proceed to Payment
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                </button>
            </div>
        </div>
    </main>

    <div class="toast" id="toast"></div>

    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="assets/js/scantopay.js"></script>
</body>
</html>
