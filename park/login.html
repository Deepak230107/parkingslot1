<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — ParkEase</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Mulish:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="assets/css/style.css" />
    <style>
        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #050508;
            position: relative;
            overflow: hidden;
            font-family: 'Outfit', sans-serif;
        }

        .login-page::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,0.03) 1px, transparent 0);
            background-size: 50px 50px;
            pointer-events: none;
            opacity: 0.5;
        }

        .login-glow {
            position: absolute;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.1) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
            filter: blur(80px);
        }

        .login-card {
            width: min(440px, 94vw);
            background: rgba(10, 10, 15, 0.8);
            backdrop-filter: blur(30px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 40px;
            padding: 56px;
            position: relative;
            z-index: 10;
            box-shadow: 0 60px 120px rgba(0, 0, 0, 0.6);
            animation: cardSlide .8s cubic-bezier(.16, 1, .3, 1);
        }

        @keyframes cardSlide {
            from { opacity: 0; transform: translateY(40px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .login-logo {
            font-family: 'Syne', sans-serif;
            font-size: 32px;
            font-weight: 800;
            color: #fff;
            text-align: center;
            margin-bottom: 40px;
            letter-spacing: -1px;
        }

        .login-logo span { color: #8b5cf6; }

        .module-toggle {
            display: grid;
            grid-template-columns: 1fr 1fr;
            background: rgba(255, 255, 255, 0.03);
            padding: 6px;
            border-radius: 18px;
            margin-bottom: 40px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .toggle-btn {
            padding: 14px;
            border-radius: 14px;
            border: none;
            background: transparent;
            color: #64748b;
            font-family: 'Syne', sans-serif;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all .4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .toggle-btn.active {
            background: #8b5cf6;
            color: #fff;
            box-shadow: 0 10px 20px rgba(139, 92, 246, 0.3);
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .form-title {
            font-family: 'Syne', sans-serif;
            font-size: 20px;
            font-weight: 800;
            margin-bottom: 8px;
            color: #fff;
        }

        .input-wrap {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .input-wrap label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #64748b;
            font-weight: 800;
        }

        .input-wrap input {
            background: rgba(255, 255, 255, 0.03);
            border: 1.5px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 16px 20px;
            color: #fff;
            font-family: 'Outfit', sans-serif;
            font-size: 15px;
            transition: all .3s;
        }

        .input-wrap input:focus {
            outline: none;
            border-color: #06b6d4;
            background: rgba(255, 255, 255, 0.06);
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.1);
        }

        .btn-login {
            background: #8b5cf6;
            color: #fff;
            border: none;
            padding: 18px;
            border-radius: 16px;
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 16px;
            margin-top: 16px;
            cursor: pointer;
            transition: all .3s;
            box-shadow: 0 15px 30px rgba(139, 92, 246, 0.2);
        }

        .btn-login:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(139, 92, 246, 0.4);
        }
        
        .login-footer a {
            color: #06b6d4;
            text-decoration: none;
            font-weight: 700;
        }

        .admin-note {
            font-size: 11px;
            color: #8b5cf6;
            background: rgba(139, 92, 246, 0.1);
            padding: 12px;
            border-radius: 12px;
            margin-top: 12px;
            display: none;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <div class="noise"></div>
    <div class="login-page">
        <div class="login-glow"></div>
        <div class="login-card">
            <div class="login-logo">Park<span>Ease</span></div>

            <div class="module-toggle">
                <button class="toggle-btn active" onclick="switchModule('user', this)">User Login</button>
                <button class="toggle-btn" onclick="switchModule('admin', this)">Admin Login</button>
            </div>

            <div class="login-form">
                <h2 class="form-title" id="formTitle">Welcome Back</h2>

                <div class="input-wrap">
                    <label>Email Address / Username</label>
                    <input type="text" id="username" placeholder="Enter your ID" value="demo_user">
                </div>

                <div class="input-wrap">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="••••••••" value="password123">
                </div>

                <div id="adminNote" class="admin-note">
                    🔒 Protected Admin Module. Requires system administrator privileges.
                </div>

                <button class="btn-login" onclick="handleLogin()">Sign In to Dashboard</button>
            </div>

            <div class="login-footer">
                Don't have an account? <a href="#">Create Account</a>
            </div>
        </div>
    </div>

    <!-- TOAST -->
    <div class="toast dark-t" id="toast"></div>

    <script src="assets/js/script.js"></script>
    <script>
        let currentModule = 'user';

        function switchModule(module, btn) {
            currentModule = module;
            document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            const title = document.getElementById('formTitle');
            const note = document.getElementById('adminNote');
            const userInp = document.getElementById('username');

            if (module === 'admin') {
                title.textContent = 'Admin Central';
                note.style.display = 'block';
                userInp.value = 'admin_root';
            } else {
                title.textContent = 'Welcome Back';
                note.style.display = 'none';
                userInp.value = 'demo_user';
            }
        }

        function handleLogin() {
            showToast(`Authenticating ${currentModule}...`, 'dark-t');

            localStorage.setItem('parkease_current_module', currentModule);

            setTimeout(() => {
                if (currentModule === 'admin') {
                    localStorage.setItem('parkease_admin_logged', 'true');
                    window.location.href = 'overview.html';
                } else {
                    localStorage.setItem('parkease_user_logged', 'true');
                    window.location.href = 'index.html';
                }
            }, 1200);
        }
    </script>
</body>

</html>
