<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Insights Overview — ParkEase</title>
    <link rel="stylesheet" href="assets/css/dashboard.css" />
    <link rel="stylesheet" href="assets/css/overview.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <div id="dashboard">
        <!-- SIDEBAR -->
        <aside class="d-sidebar">
            <div class="d-logo-wrap">
                <div class="d-logo-box">P</div>
                <div class="d-logo-name">Park<span>Ease</span></div>
            </div>
            <nav class="d-nav">
                <a href="overview.html" class="d-nav-item active">
                    <span class="d-nav-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg></span>
                    Insights
                </a>
                <a href="dashboard.html" class="d-nav-item">
                    <span class="d-nav-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3h18v18H3z"></path><path d="M9 3v18M15 3v18M3 9h18M3 15h18"></path></svg></span>
                    Slot Allotment
                </a>
                <a href="users.html" class="d-nav-item">
                    <span class="d-nav-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg></span>
                    Staff & Users
                </a>
                <a href="payments.html" class="d-nav-item">
                    <span class="d-nav-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect><line x1="1" y1="10" x2="23" y2="10"></line></svg></span>
                    Revenue
                </a>
            </nav>
            <div class="d-sidebar-bot">
                <a href="index.html" class="back-btn">
                    Logout
                </a>
            </div>
        </aside>

        <!-- MAIN -->
        <div class="d-main">
            <div class="d-topbar">
                <div class="d-search">
                    <span class="d-search-ico">🔍</span>
                    <input type="text" placeholder="Search operational data..." />
                </div>
                <div class="d-topbar-r">
                    <span class="d-date-lbl" id="dDateLbl"></span>
                </div>
            </div>

            <!-- CONTENT -->
            <div class="d-content">
                <div class="d-overview-grid">
                    <div class="d-card span-2">
                        <div class="d-card-hdr">
                            <h3 class="d-card-title">Weekly Revenue Stream</h3>
                        </div>
                        <div class="chart-container">
                            <canvas id="revenueChart"></canvas>
                        </div>
                    </div>
                    <div class="d-card">
                        <div class="d-card-hdr">
                            <h3 class="d-card-title">Live Operational Feed</h3>
                        </div>
                        <div class="d-activity-list" id="activityList">
                            <!-- Activities will be populated by JS -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="assets/js/overview.js"></script>
    <script>
        document.getElementById('dDateLbl').textContent = new Date().toLocaleDateString('en-IN', { weekday: 'short', day: 'numeric', month: 'short' });
    </script>
</body>

</html>
