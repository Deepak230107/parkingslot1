<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard — ParkEase</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;500;600;700;800&family=Mulish:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="assets/css/dashboard.css" />
</head>

<body>

    <div id="dashboard">
        <!-- SIDEBAR -->
        <aside class="d-sidebar">
            <div class="d-logo-wrap">
                <div class="d-logo-box">P</div>
                <div class="d-logo-name">Park<span>Ease</span></div>
            </div>
            <nav class="d-nav">
                <a href="overview.html" class="d-nav-item" style="text-decoration:none;">
                    <span class="d-nav-ico"><svg width="15" height="15" viewBox="0 0 15 15" fill="none">
                            <rect x="1" y="1" width="5.5" height="5.5" rx="1.2" stroke="currentColor"
                                stroke-width="1.5" />
                            <rect x="8.5" y="1" width="5.5" height="5.5" rx="1.2" stroke="currentColor"
                                stroke-width="1.5" />
                            <rect x="1" y="8.5" width="5.5" height="5.5" rx="1.2" stroke="currentColor"
                                stroke-width="1.5" />
                            <rect x="8.5" y="8.5" width="5.5" height="5.5" rx="1.2" stroke="currentColor"
                                stroke-width="1.5" />
                        </svg></span>
                    Dashboard
                </a>
                <a href="dashboard.html" class="d-nav-item active" style="text-decoration:none;">
                    <span class="d-nav-ico"><svg width="15" height="15" viewBox="0 0 15 15" fill="none">
                            <rect x="1" y="1" width="13" height="13" rx="2" stroke="currentColor" stroke-width="1.5" />
                            <path d="M4 7.5h7M4 5h4M4 10h5" stroke="currentColor" stroke-width="1.5"
                                stroke-linecap="round" />
                        </svg></span>
                    Allotment
                    <span class="d-badge">3</span>
                </a>
                <a href="users.html" class="d-nav-item" style="text-decoration:none;">
                    <span class="d-nav-ico"><svg width="15" height="15" viewBox="0 0 15 15" fill="none">
                            <circle cx="7.5" cy="5" r="2.8" stroke="currentColor" stroke-width="1.5" />
                            <path d="M2 13.5c0-2.8 2.5-4.8 5.5-4.8s5.5 2 5.5 4.8" stroke="currentColor"
                                stroke-width="1.5" stroke-linecap="round" />
                        </svg></span>
                    Users
                </a>
                <a href="payments.html" class="d-nav-item" style="text-decoration:none;">
                    <span class="d-nav-ico"><svg width="15" height="15" viewBox="0 0 15 15" fill="none">
                            <rect x="1" y="3" width="13" height="9" rx="2" stroke="currentColor" stroke-width="1.5" />
                            <path d="M5 7.5h5M7.5 5.5v4" stroke="currentColor" stroke-width="1.5"
                                stroke-linecap="round" />
                        </svg></span>
                    Payments
                </a>
                <a href="report.html" class="d-nav-item" style="text-decoration:none;">
                    <span class="d-nav-ico"><svg width="15" height="15" viewBox="0 0 15 15" fill="none">
                            <path d="M3 2h9v11H3z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" />
                            <path d="M5.5 6h4M5.5 8.5h4M5.5 11h2" stroke="currentColor" stroke-width="1.5"
                                stroke-linecap="round" />
                        </svg></span>
                    Report
                </a>
            </nav>
            <div class="d-sidebar-bot">
                <a href="settings.html" class="d-nav-item" style="text-decoration:none;">
                    <span class="d-nav-ico"><svg width="15" height="15" viewBox="0 0 15 15" fill="none">
                            <circle cx="7.5" cy="7.5" r="2" stroke="currentColor" stroke-width="1.5" />
                            <path d="M7.5 1v1.5M7.5 12.5V14M1 7.5h1.5M12.5 7.5H14M3 3l1 1M11 11l1 1M11 3l-1 1M4 11l-1 1"
                                stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
                        </svg></span>
                    Settings
                </a>
                <a href="index.html" class="back-btn">
                    <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                        <path d="M9 2L4 7L9 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round" />
                    </svg>
                    Back to Site
                </a>
            </div>
        </aside>

        <!-- MAIN -->
        <div class="d-main">
            <!-- TOPBAR -->
            <div class="d-topbar">
                <div class="d-search">
                    <span class="d-search-ico">🔍</span>
                    <input type="text" placeholder="Search slot, vehicle, user..." oninput="dSearch(this.value)" />
                </div>
                <button class="d-filter">
                    <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
                        <circle cx="4.5" cy="3.5" r="1.5" stroke="currentColor" stroke-width="1.4" />
                        <circle cx="8.5" cy="9.5" r="1.5" stroke="currentColor" stroke-width="1.4" />
                        <path d="M1 3.5h2M6 3.5h6M1 9.5h6M10 9.5h2" stroke="currentColor" stroke-width="1.4"
                            stroke-linecap="round" />
                    </svg>
                    Filter
                </button>
                <div class="d-topbar-r">
                    <span class="d-date-lbl" id="dDateLbl"></span>
                    <div class="d-ico-btn on">⊞</div>
                    <div class="d-ico-btn">📍</div>
                </div>
            </div>

            <!-- CONTENT -->
            <div class="d-content">
                <!-- Stats -->
                <div class="d-stats">
                    <div class="d-stat">
                        <div class="d-stat-ico ic-g">🟢</div>
                        <div>
                            <div class="d-stat-n" id="dAvail">—</div>
                            <div class="d-stat-l">Available</div>
                        </div>
                    </div>
                    <div class="d-stat">
                        <div class="d-stat-ico ic-r">🔴</div>
                        <div>
                            <div class="d-stat-n" id="dOcc">—</div>
                            <div class="d-stat-l">Occupied</div>
                        </div>
                    </div>
                    <div class="d-stat">
                        <div class="d-stat-ico ic-y">🟡</div>
                        <div>
                            <div class="d-stat-n" id="dSel">0</div>
                            <div class="d-stat-l">Selected</div>
                        </div>
                    </div>
                    <div class="d-stat">
                        <div class="d-stat-ico ic-b">🔵</div>
                        <div>
                            <div class="d-stat-n" id="dTotal">—</div>
                            <div class="d-stat-l">Total Slots</div>
                        </div>
                    </div>
                </div>

                <!-- Vehicle tabs -->
                <div class="d-vtabs">
                    <div class="d-vtab active" onclick="dVehicle('CAR',this)">
                        <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
                            <rect x="1" y="4" width="14" height="7" rx="2" fill="currentColor" opacity=".9" />
                            <path d="M3 4L5 1H11L13 4" stroke="currentColor" stroke-width="1.5"
                                stroke-linejoin="round" />
                            <circle cx="4" cy="11" r="1.5" fill="white" />
                            <circle cx="12" cy="11" r="1.5" fill="white" />
                        </svg>
                        CAR
                    </div>
                    <div class="d-vtab" onclick="dVehicle('BIKE',this)">
                        <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
                            <circle cx="3" cy="9" r="2.5" stroke="currentColor" stroke-width="1.4" />
                            <circle cx="13" cy="9" r="2.5" stroke="currentColor" stroke-width="1.4" />
                            <path d="M3 9L5 4L8 2L13 5L13 9" stroke="currentColor" stroke-width="1.4"
                                stroke-linejoin="round" />
                        </svg>
                        BIKE
                    </div>
                    <div class="d-vtab" onclick="dVehicle('TRUCK',this)">
                        <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
                            <rect x="1" y="2" width="10" height="8" rx="1.5" stroke="currentColor" stroke-width="1.4" />
                            <rect x="11" y="5" width="4" height="5" rx="1" stroke="currentColor" stroke-width="1.4" />
                            <circle cx="3.5" cy="11" r="1.5" stroke="currentColor" stroke-width="1.4" />
                            <circle cx="9.5" cy="11" r="1.5" stroke="currentColor" stroke-width="1.4" />
                        </svg>
                        TRUCK
                    </div>
                </div>

                <!-- Zone header -->
                <div class="d-lot-hdr">
                    <div class="d-lot-title">Parking Allotment — All Zones</div>
                    <div class="d-legend">
                        <div class="d-leg-i">
                            <div class="d-leg-d fr"></div>Available
                        </div>
                        <div class="d-leg-i">
                            <div class="d-leg-d oc"></div>Occupied
                        </div>
                        <div class="d-leg-i">
                            <div class="d-leg-d sl"></div>Selected
                        </div>
                    </div>
                </div>

                <!-- Zones -->
                <div class="d-zones" id="dZonesGrid"></div>
            </div>
        </div>
    </div>

    <!-- DETAIL PANEL -->
    <div class="d-panel" id="dPanel">
        <div class="d-panel-head">
            <div class="d-panel-title" id="dPanelTitle">Slot Detail</div>
            <button class="d-panel-close" onclick="dClosePanel()">✕</button>
        </div>
        <div class="d-slot-big" id="dPanelVis">
            <svg width="58" height="44" viewBox="0 0 58 44" fill="none">
                <rect x="2" y="12" width="54" height="24" rx="5" fill="#eef0f5" />
                <path d="M8 12L13 3H45L50 12" stroke="#1a1d24" stroke-width="2.2" stroke-linejoin="round" />
                <ellipse cx="12" cy="38" rx="5" ry="5" fill="#1a1d24" />
                <ellipse cx="46" cy="38" rx="5" ry="5" fill="#1a1d24" />
                <rect x="17" y="5" width="24" height="7" rx="2" fill="#c8ccd8" />
            </svg>
        </div>
        <div id="dPanelInfo"></div>
        <div class="d-panel-acts" id="dPanelActs"></div>
    </div>

    <!-- TOAST -->
    <div class="toast dark-t" id="toast"></div>

    <script src="assets/js/dashboard.js"></script>
</body>

</html>
