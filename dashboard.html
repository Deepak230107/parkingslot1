<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard — ParkEase</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;500;600;700;800&family=Mulish:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --gold: #f5a800;
            --gold-light: #ffc940;
            --gold-dim: rgba(245, 168, 0, 0.13);
            --dark: #13151a;
            --dark2: #1a1d24;
            --dark3: #22262f;
            --bg: #f0f2f6;
            --white: #fff;
            --text: #13151a;
            --muted: #8a90a2;
            --border-dark: rgba(255, 255, 255, 0.07);
            --border-light: #e2e5ee;
            --green: #22c55e;
            --red: #ef4444;
            --blue: #3b82f6;
            --sidebar-w: 220px;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Mulish', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
        }

        /* ═══════════════════════════════════════════
   ADMIN DASHBOARD
═══════════════════════════════════════════ */
        #dashboard {
            display: flex;
            height: 100vh;
            flex-direction: row;
        }

        /* SIDEBAR */
        .d-sidebar {
            width: var(--sidebar-w);
            background: var(--dark2);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            border-right: 1px solid rgba(255, 255, 255, 0.06);
        }

        .d-logo-wrap {
            padding: 26px 22px 22px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            display: flex;
            align-items: center;
            gap: 11px;
        }

        .d-logo-box {
            width: 38px;
            height: 38px;
            border-radius: 9px;
            background: var(--gold);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Syne', sans-serif;
            font-size: 17px;
            font-weight: 800;
            color: #111;
        }

        .d-logo-name {
            font-family: 'Syne', sans-serif;
            font-size: 16px;
            font-weight: 700;
            color: #fff;
            letter-spacing: .4px;
        }

        .d-logo-name span {
            color: var(--gold);
        }

        .d-nav {
            flex: 1;
            padding: 18px 10px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .d-nav-item {
            display: flex;
            align-items: center;
            gap: 11px;
            padding: 10px 13px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.4);
            transition: all .18s;
            letter-spacing: .15px;
            font-family: 'Mulish', sans-serif;
            position: relative;
        }

        .d-nav-item:hover {
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.75);
        }

        .d-nav-item.active {
            background: rgba(245, 168, 0, 0.11);
            color: var(--gold);
        }

        .d-badge {
            margin-left: auto;
            background: var(--gold);
            color: #111;
            font-size: 10px;
            font-weight: 700;
            padding: 2px 7px;
            border-radius: 100px;
        }

        .d-nav-ico {
            width: 16px;
            height: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            opacity: .7;
        }

        .d-nav-item.active .d-nav-ico {
            opacity: 1;
        }

        .d-sidebar-bot {
            padding: 14px 10px 22px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 9px;
            padding: 10px 13px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12.5px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.35);
            transition: all .18s;
            font-family: 'Mulish', sans-serif;
            text-decoration: none;
        }

        .back-btn:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.05);
        }

        /* MAIN AREA */
        .d-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: var(--bg);
        }

        /* TOPBAR */
        .d-topbar {
            background: var(--white);
            padding: 0 26px;
            height: 62px;
            display: flex;
            align-items: center;
            gap: 14px;
            border-bottom: 1px solid var(--border-light);
            flex-shrink: 0;
        }

        .d-search {
            position: relative;
            flex: 1;
            max-width: 320px;
        }

        .d-search input {
            width: 100%;
            padding: 8px 13px 8px 34px;
            border: 1.5px solid var(--border-light);
            border-radius: 8px;
            font-family: 'Mulish', sans-serif;
            font-size: 13px;
            color: var(--text);
            background: var(--bg);
            outline: none;
            transition: border-color .2s;
        }

        .d-search input:focus {
            border-color: rgba(245, 168, 0, .5);
        }

        .d-search input::placeholder {
            color: var(--muted);
        }

        .d-search-ico {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 13px;
            color: var(--muted);
        }

        .d-filter {
            padding: 7px 13px;
            border: 1.5px solid var(--border-light);
            border-radius: 8px;
            background: var(--bg);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--muted);
            font-family: 'Mulish', sans-serif;
            font-weight: 600;
            transition: all .2s;
        }

        .d-filter:hover {
            border-color: var(--gold);
            color: var(--gold);
        }

        .d-topbar-r {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .d-ico-btn {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            border: 1.5px solid var(--border-light);
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all .2s;
            color: var(--muted);
            font-size: 14px;
        }

        .d-ico-btn:hover {
            border-color: var(--gold);
            color: var(--gold);
        }

        .d-ico-btn.on {
            background: var(--dark);
            border-color: var(--dark);
            color: #fff;
        }

        .d-date-lbl {
            font-size: 12px;
            color: var(--muted);
            font-weight: 500;
        }

        /* CONTENT */
        .d-content {
            flex: 1;
            overflow-y: auto;
            padding: 22px 26px;
            scrollbar-width: thin;
            scrollbar-color: var(--border-light) transparent;
        }

        .d-content::-webkit-scrollbar {
            width: 4px;
        }

        .d-content::-webkit-scrollbar-thumb {
            background: var(--border-light);
            border-radius: 4px;
        }

        /* STAT CARDS */
        .d-stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 13px;
            margin-bottom: 20px;
        }

        .d-stat {
            background: var(--white);
            border-radius: 10px;
            padding: 16px 18px;
            border: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            gap: 13px;
            transition: transform .15s;
            cursor: default;
        }

        .d-stat:hover {
            transform: translateY(-2px);
        }

        .d-stat-ico {
            width: 42px;
            height: 42px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .ic-g {
            background: rgba(34, 197, 94, 0.1);
        }

        .ic-r {
            background: rgba(239, 68, 68, 0.1);
        }

        .ic-y {
            background: rgba(245, 168, 0, 0.1);
        }

        .ic-b {
            background: rgba(59, 130, 246, 0.1);
        }

        .d-stat-n {
            font-family: 'Syne', sans-serif;
            font-size: 22px;
            font-weight: 700;
            color: var(--text);
            line-height: 1;
        }

        .d-stat-l {
            font-size: 10.5px;
            color: var(--muted);
            margin-top: 3px;
            font-weight: 700;
            letter-spacing: .35px;
            text-transform: uppercase;
        }

        /* VEHICLE TABS */
        .d-vtabs {
            display: flex;
            gap: 9px;
            margin-bottom: 18px;
        }

        .d-vtab {
            display: flex;
            align-items: center;
            gap: 7px;
            padding: 9px 20px;
            border-radius: 9px;
            border: 1.5px solid var(--border-light);
            background: var(--white);
            cursor: pointer;
            font-size: 13px;
            font-weight: 700;
            color: var(--muted);
            font-family: 'Syne', sans-serif;
            letter-spacing: .4px;
            transition: all .2s;
        }

        .d-vtab:hover {
            border-color: rgba(245, 168, 0, .4);
            color: var(--text);
        }

        .d-vtab.active {
            background: var(--gold);
            border-color: var(--gold);
            color: #111;
            box-shadow: 0 4px 16px rgba(245, 168, 0, .28);
        }

        /* ZONE GRID */
        .d-lot-hdr {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
        }

        .d-lot-title {
            font-family: 'Syne', sans-serif;
            font-size: 14.5px;
            font-weight: 700;
            color: var(--text);
        }

        .d-legend {
            display: flex;
            gap: 14px;
        }

        .d-leg-i {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 10.5px;
            color: var(--muted);
            font-weight: 600;
        }

        .d-leg-d {
            width: 10px;
            height: 10px;
            border-radius: 3px;
        }

        .d-leg-d.fr {
            background: #eef0f5;
            border: 1.5px solid #d5d9e8;
        }

        .d-leg-d.oc {
            background: var(--dark);
        }

        .d-leg-d.sl {
            background: var(--gold);
        }

        .d-zones {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
        }

        .d-zone {
            background: var(--white);
            border-radius: 10px;
            border: 1px solid var(--border-light);
            padding: 14px;
            animation: fadeUp .35s ease both;
        }

        .d-zone-lbl {
            font-family: 'Syne', sans-serif;
            font-size: 11px;
            font-weight: 700;
            color: var(--muted);
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 11px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .d-zone-cnt {
            background: var(--bg);
            border-radius: 6px;
            padding: 2px 8px;
            font-size: 10.5px;
            color: var(--text);
            font-family: 'Mulish', sans-serif;
        }

        .d-slot-col {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .d-slot-row {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .d-slot {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            cursor: pointer;
            transition: all .14s;
        }

        .d-slot-body {
            width: 42px;
            height: 34px;
            border-radius: 6px;
            background: #eef0f5;
            border: 1.5px solid #d5d9e8;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all .14s;
        }

        .d-slot:hover .d-slot-body {
            border-color: rgba(245, 168, 0, .5);
            transform: scale(1.05);
        }

        .d-slot.occ .d-slot-body {
            background: var(--dark2);
            border-color: var(--dark);
        }

        .d-slot.sel .d-slot-body {
            background: var(--gold);
            border-color: var(--gold);
            box-shadow: 0 4px 13px rgba(245, 168, 0, .35);
        }

        .d-slot-id {
            font-size: 8.5px;
            font-weight: 700;
            color: var(--muted);
            font-family: 'Syne', sans-serif;
            letter-spacing: .3px;
        }

        .d-slot.occ .d-slot-id {
            color: rgba(255, 255, 255, .4);
        }

        .d-slot.sel .d-slot-id {
            color: #111;
        }

        .d-aisle {
            height: 9px;
            border-top: 1.5px dashed var(--border-light);
            border-bottom: 1.5px dashed var(--border-light);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 3px 0;
        }

        .d-aisle-lbl {
            font-size: 8px;
            color: var(--muted);
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* DETAIL PANEL */
        .d-panel {
            position: fixed;
            right: -310px;
            top: 0;
            width: 290px;
            height: 100vh;
            background: var(--white);
            border-left: 1px solid var(--border-light);
            z-index: 100;
            transition: right .3s cubic-bezier(.4, 0, .2, 1);
            padding: 22px;
            overflow-y: auto;
        }

        .d-panel.open {
            right: 0;
        }

        .d-panel-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 18px;
        }

        .d-panel-title {
            font-family: 'Syne', sans-serif;
            font-size: 15px;
            font-weight: 700;
            color: var(--text);
        }

        .d-panel-close {
            width: 28px;
            height: 28px;
            border-radius: 7px;
            background: var(--bg);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: var(--muted);
            transition: all .2s;
        }

        .d-panel-close:hover {
            background: var(--dark);
            color: #fff;
        }

        .d-slot-big {
            width: 100%;
            height: 110px;
            border-radius: 11px;
            background: var(--bg);
            border: 1.5px solid var(--border-light);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 18px;
        }

        .d-slot-big.sel-bg {
            background: var(--gold-dim);
            border-color: rgba(245, 168, 0, .3);
        }

        .d-slot-big.occ-bg {
            background: rgba(26, 29, 35, .05);
            border-color: rgba(26, 29, 35, .2);
        }

        .d-info-row {
            display: flex;
            justify-content: space-between;
            padding: 9px 0;
            border-bottom: 1px solid var(--border-light);
            font-size: 12.5px;
        }

        .d-info-row:last-of-type {
            border: none;
        }

        .d-info-k {
            color: var(--muted);
            font-weight: 500;
        }

        .d-info-v {
            font-weight: 700;
            color: var(--text);
        }

        .d-badge {
            padding: 3px 10px;
            border-radius: 100px;
            font-size: 10.5px;
            font-weight: 700;
        }

        .d-badge.fr {
            background: rgba(34, 197, 94, .1);
            color: var(--green);
        }

        .d-badge.oc {
            background: rgba(26, 29, 35, .08);
            color: var(--dark);
        }

        .d-badge.sl {
            background: var(--gold-dim);
            color: #a06a00;
        }

        .d-panel-acts {
            display: flex;
            flex-direction: column;
            gap: 9px;
            margin-top: 18px;
        }

        .d-act-btn {
            padding: 11px;
            border-radius: 9px;
            font-family: 'Mulish', sans-serif;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            border: none;
            transition: all .2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
        }

        .d-act-btn.primary {
            background: var(--gold);
            color: #111;
        }

        .d-act-btn.primary:hover {
            background: var(--gold-light);
        }

        .d-act-btn.secondary {
            background: var(--bg);
            color: var(--text);
            border: 1.5px solid var(--border-light);
        }

        .d-act-btn.secondary:hover {
            border-color: var(--dark);
        }

        .d-act-btn.danger {
            background: rgba(239, 68, 68, .07);
            color: var(--red);
            border: 1.5px solid rgba(239, 68, 68, .2);
        }

        .d-act-btn.danger:hover {
            background: rgba(239, 68, 68, .14);
        }

        /* TOAST */
        .toast {
            position: fixed;
            bottom: 26px;
            left: 50%;
            transform: translateX(-50%) translateY(16px);
            padding: 11px 22px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            opacity: 0;
            transition: all .28s;
            pointer-events: none;
            white-space: nowrap;
            z-index: 999;
            font-family: 'Mulish', sans-serif;
        }

        .toast.dark-t {
            background: var(--dark);
            color: #fff;
            border-left: 3px solid var(--gold);
        }

        .toast.light-t {
            background: var(--white);
            color: var(--text);
            border-left: 3px solid var(--gold);
            box-shadow: 0 4px 22px rgba(0, 0, 0, .12);
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* ANIMATIONS */
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(18px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <div id="dashboard">
        <!-- SIDEBAR -->
        <aside class="d-sidebar">
            <div class="d-logo-wrap">
                <div class="d-logo-box">P</div>
                <div class="d-logo-name">Park<span>Ease</span></div>
            </div>
            <nav class="d-nav">
                <div class="d-nav-item" onclick="dNav(this)">
                    <span class="d-nav-ico"><svg width="15" height="15" viewBox="0 0 15 15" fill="none">
                            <rect x="1" y="1" width="5.5" height="5.5" rx="1.2" stroke="currentColor"
                                stroke-width="1.5" />
                            <rect x="8.5" y="1" width="5.5" height="5.5" rx="1.2" stroke="currentColor"
                                stroke-width="1.5" />
                            <rect x="1" y="8.5" width="5.5" height="5.5" rx="1.2" stroke="currentColor"
                                stroke-width="1.5" />
                            <rect x="8.5" y="8.5" width="5.5" height="5.5" rx="1.2" stroke="currentColor"
                                stroke-width="1.5" />
                        </svg></span>
                    Dashboard
                </div>
                <div class="d-nav-item active" onclick="dNav(this)">
                    <span class="d-nav-ico"><svg width="15" height="15" viewBox="0 0 15 15" fill="none">
                            <rect x="1" y="1" width="13" height="13" rx="2" stroke="currentColor" stroke-width="1.5" />
                            <path d="M4 7.5h7M4 5h4M4 10h5" stroke="currentColor" stroke-width="1.5"
                                stroke-linecap="round" />
                        </svg></span>
                    Allotment
                    <span class="d-badge">3</span>
                </div>
                <div class="d-nav-item" onclick="dNav(this)">
                    <span class="d-nav-ico"><svg width="15" height="15" viewBox="0 0 15 15" fill="none">
                            <circle cx="7.5" cy="5" r="2.8" stroke="currentColor" stroke-width="1.5" />
                            <path d="M2 13.5c0-2.8 2.5-4.8 5.5-4.8s5.5 2 5.5 4.8" stroke="currentColor"
                                stroke-width="1.5" stroke-linecap="round" />
                        </svg></span>
                    Users
                </div>
                <div class="d-nav-item" onclick="dNav(this)">
                    <span class="d-nav-ico"><svg width="15" height="15" viewBox="0 0 15 15" fill="none">
                            <rect x="1" y="3" width="13" height="9" rx="2" stroke="currentColor" stroke-width="1.5" />
                            <path d="M5 7.5h5M7.5 5.5v4" stroke="currentColor" stroke-width="1.5"
                                stroke-linecap="round" />
                        </svg></span>
                    Payments
                </div>
                <div class="d-nav-item" onclick="dNav(this)">
                    <span class="d-nav-ico"><svg width="15" height="15" viewBox="0 0 15 15" fill="none">
                            <path d="M3 2h9v11H3z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" />
                            <path d="M5.5 6h4M5.5 8.5h4M5.5 11h2" stroke="currentColor" stroke-width="1.5"
                                stroke-linecap="round" />
                        </svg></span>
                    Report
                </div>
            </nav>
            <div class="d-sidebar-bot">
                <div class="d-nav-item" onclick="dNav(this)">
                    <span class="d-nav-ico"><svg width="15" height="15" viewBox="0 0 15 15" fill="none">
                            <circle cx="7.5" cy="7.5" r="2" stroke="currentColor" stroke-width="1.5" />
                            <path d="M7.5 1v1.5M7.5 12.5V14M1 7.5h1.5M12.5 7.5H14M3 3l1 1M11 11l1 1M11 3l-1 1M4 11l-1 1"
                                stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
                        </svg></span>
                    Settings
                </div>
                <a href="index.html" class="back-btn">
                    <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                        <path d="M9 2L4 7L9 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round" />
                    </svg>
                    Back to Site
                </a>
            </div>
        </aside>

        <!-- MAIN -->
        <div class="d-main">
            <!-- TOPBAR -->
            <div class="d-topbar">
                <div class="d-search">
                    <span class="d-search-ico">🔍</span>
                    <input type="text" placeholder="Search slot, vehicle, user..." oninput="dSearch(this.value)" />
                </div>
                <button class="d-filter">
                    <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
                        <circle cx="4.5" cy="3.5" r="1.5" stroke="currentColor" stroke-width="1.4" />
                        <circle cx="8.5" cy="9.5" r="1.5" stroke="currentColor" stroke-width="1.4" />
                        <path d="M1 3.5h2M6 3.5h6M1 9.5h6M10 9.5h2" stroke="currentColor" stroke-width="1.4"
                            stroke-linecap="round" />
                    </svg>
                    Filter
                </button>
                <div class="d-topbar-r">
                    <span class="d-date-lbl" id="dDateLbl"></span>
                    <div class="d-ico-btn on">⊞</div>
                    <div class="d-ico-btn">📍</div>
                </div>
            </div>

            <!-- CONTENT -->
            <div class="d-content">
                <!-- Stats -->
                <div class="d-stats">
                    <div class="d-stat">
                        <div class="d-stat-ico ic-g">🟢</div>
                        <div>
                            <div class="d-stat-n" id="dAvail">—</div>
                            <div class="d-stat-l">Available</div>
                        </div>
                    </div>
                    <div class="d-stat">
                        <div class="d-stat-ico ic-r">🔴</div>
                        <div>
                            <div class="d-stat-n" id="dOcc">—</div>
                            <div class="d-stat-l">Occupied</div>
                        </div>
                    </div>
                    <div class="d-stat">
                        <div class="d-stat-ico ic-y">🟡</div>
                        <div>
                            <div class="d-stat-n" id="dSel">0</div>
                            <div class="d-stat-l">Selected</div>
                        </div>
                    </div>
                    <div class="d-stat">
                        <div class="d-stat-ico ic-b">🔵</div>
                        <div>
                            <div class="d-stat-n" id="dTotal">—</div>
                            <div class="d-stat-l">Total Slots</div>
                        </div>
                    </div>
                </div>

                <!-- Vehicle tabs -->
                <div class="d-vtabs">
                    <div class="d-vtab active" onclick="dVehicle('CAR',this)">
                        <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
                            <rect x="1" y="4" width="14" height="7" rx="2" fill="currentColor" opacity=".9" />
                            <path d="M3 4L5 1H11L13 4" stroke="currentColor" stroke-width="1.5"
                                stroke-linejoin="round" />
                            <circle cx="4" cy="11" r="1.5" fill="white" />
                            <circle cx="12" cy="11" r="1.5" fill="white" />
                        </svg>
                        CAR
                    </div>
                    <div class="d-vtab" onclick="dVehicle('BIKE',this)">
                        <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
                            <circle cx="3" cy="9" r="2.5" stroke="currentColor" stroke-width="1.4" />
                            <circle cx="13" cy="9" r="2.5" stroke="currentColor" stroke-width="1.4" />
                            <path d="M3 9L5 4L8 2L13 5L13 9" stroke="currentColor" stroke-width="1.4"
                                stroke-linejoin="round" />
                        </svg>
                        BIKE
                    </div>
                    <div class="d-vtab" onclick="dVehicle('TRUCK',this)">
                        <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
                            <rect x="1" y="2" width="10" height="8" rx="1.5" stroke="currentColor" stroke-width="1.4" />
                            <rect x="11" y="5" width="4" height="5" rx="1" stroke="currentColor" stroke-width="1.4" />
                            <circle cx="3.5" cy="11" r="1.5" stroke="currentColor" stroke-width="1.4" />
                            <circle cx="9.5" cy="11" r="1.5" stroke="currentColor" stroke-width="1.4" />
                        </svg>
                        TRUCK
                    </div>
                </div>

                <!-- Zone header -->
                <div class="d-lot-hdr">
                    <div class="d-lot-title">Parking Allotment — All Zones</div>
                    <div class="d-legend">
                        <div class="d-leg-i">
                            <div class="d-leg-d fr"></div>Available
                        </div>
                        <div class="d-leg-i">
                            <div class="d-leg-d oc"></div>Occupied
                        </div>
                        <div class="d-leg-i">
                            <div class="d-leg-d sl"></div>Selected
                        </div>
                    </div>
                </div>

                <!-- Zones -->
                <div class="d-zones" id="dZonesGrid"></div>
            </div>
        </div>
    </div>

    <!-- DETAIL PANEL -->
    <div class="d-panel" id="dPanel">
        <div class="d-panel-head">
            <div class="d-panel-title" id="dPanelTitle">Slot Detail</div>
            <button class="d-panel-close" onclick="dClosePanel()">✕</button>
        </div>
        <div class="d-slot-big" id="dPanelVis">
            <svg width="58" height="44" viewBox="0 0 58 44" fill="none">
                <rect x="2" y="12" width="54" height="24" rx="5" fill="#eef0f5" />
                <path d="M8 12L13 3H45L50 12" stroke="#1a1d24" stroke-width="2.2" stroke-linejoin="round" />
                <ellipse cx="12" cy="38" rx="5" ry="5" fill="#1a1d24" />
                <ellipse cx="46" cy="38" rx="5" ry="5" fill="#1a1d24" />
                <rect x="17" y="5" width="24" height="7" rx="2" fill="#c8ccd8" />
            </svg>
        </div>
        <div id="dPanelInfo"></div>
        <div class="d-panel-acts" id="dPanelActs"></div>
    </div>

    <!-- TOAST -->
    <div class="toast dark-t" id="toast"></div>

    <script>
        // ════════════ DASHBOARD LOGIC ════════════
        const dZones = ['A', 'B', 'C', 'D'];
        let dSlots = {};
        let dSelSlot = null;
        const dNames = ['Arjun S.', 'Priya M.', 'Ravi K.', 'Kavya T.', 'Arun B.', 'Deepa R.'];
        const dPlates = ['TN09AX1234', 'KA04BZ5678', 'MH12CD9012', 'DL7CE3456', 'AP28FG7890', 'TS11HI2345'];

        function seededR(seed) { let x = Math.sin(seed + 3) * 10000; return x - Math.floor(x); }

        function initDashboard() {
            if (Object.keys(dSlots).length > 0) return;
            let idx = 0;
            dZones.forEach(z => {
                for (let n = 1; n <= 16; n++) {
                    const id = `${z}${String(n).padStart(2, '0')}`;
                    const r = seededR(idx++);
                    const state = r < 0.45 ? 'occupied' : 'free';
                    dSlots[id] = {
                        id, zone: z, num: n, state,
                        plate: state === 'occupied' ? dPlates[Math.floor(r * 6)] : '',
                        user: state === 'occupied' ? dNames[Math.floor(r * 6)] : '',
                        since: state === 'occupied' ? `${Math.floor(r * 5) + 8}:${r > .5 ? '30' : '00'} AM` : '',
                    };
                }
            });
            document.getElementById('dDateLbl').textContent = new Date().toLocaleDateString('en-IN', { weekday: 'short', day: 'numeric', month: 'short' });
            dRender();
        }

        function dRender() {
            const grid = document.getElementById('dZonesGrid'); grid.innerHTML = '';
            let free = 0, occ = 0, sel = 0, total = 0;
            dZones.forEach((z, zi) => {
                const zSlots = Object.values(dSlots).filter(s => s.zone === z);
                const zFree = zSlots.filter(s => s.state === 'free').length;
                free += zFree; occ += zSlots.filter(s => s.state === 'occupied').length;
                sel += zSlots.filter(s => s.state === 'selected').length; total += zSlots.length;
                const card = document.createElement('div');
                card.className = 'd-zone'; card.style.animationDelay = `${zi * .07}s`;
                card.innerHTML = `<div class="d-zone-lbl">Zone ${z}<span class="d-zone-cnt">${zFree} free</span></div><div class="d-slot-col" id="dCol${z}"></div>`;
                grid.appendChild(card);
                const col = card.querySelector(`#dCol${z}`);
                for (let row = 0; row < 8; row++) {
                    if (row === 4) { const a = document.createElement('div'); a.className = 'd-aisle'; a.innerHTML = '<span class="d-aisle-lbl">← aisle →</span>'; col.appendChild(a); }
                    const rDiv = document.createElement('div'); rDiv.className = 'd-slot-row';
                    [row * 2 + 1, row * 2 + 2].forEach(n => { const id = `${z}${String(n).padStart(2, '0')}`; rDiv.appendChild(dBuildSlot(id)); });
                    col.appendChild(rDiv);
                }
            });
            document.getElementById('dAvail').textContent = free;
            document.getElementById('dOcc').textContent = occ;
            document.getElementById('dSel').textContent = sel;
            document.getElementById('dTotal').textContent = total;
        }

        function dBuildSlot(id) {
            const s = dSlots[id]; if (!s) return document.createElement('div');
            const wrap = document.createElement('div');
            wrap.className = `d-slot ${s.state === 'occupied' ? 'occ' : s.state === 'selected' ? 'sel' : ''}`;
            wrap.dataset.id = id;
            const carFill = s.state === 'occupied' ? 'rgba(255,255,255,0.7)' : s.state === 'selected' ? '#111' : '#1a1d24';
            const carOp = s.state === 'free' ? '0.2' : '0.9';
            wrap.innerHTML = `
    <div class="d-slot-body">
      <svg width="32" height="26" viewBox="0 0 32 26" fill="none">
        <rect x="2" y="8" width="28" height="14" rx="3" fill="${carFill}" opacity="${carOp}"/>
        <path d="M5 8L8 3H24L27 8" stroke="${carFill}" stroke-width="1.6" stroke-linejoin="round" opacity="${carOp}"/>
        <ellipse cx="8" cy="22" rx="3" ry="3" fill="${s.state !== 'free' ? carFill : 'transparent'}" opacity="${carOp}"/>
        <ellipse cx="24" cy="22" rx="3" ry="3" fill="${s.state !== 'free' ? carFill : 'transparent'}" opacity="${carOp}"/>
      </svg>
    </div>
    <div class="d-slot-id">${id}</div>`;
            wrap.addEventListener('click', () => dSlotClick(id));
            return wrap;
        }

        function dSlotClick(id) {
            const s = dSlots[id]; if (!s) return;
            if (s.state === 'free') {
                if (dSelSlot && dSelSlot !== id) dSlots[dSelSlot].state = 'free';
                dSlots[id].state = 'selected'; dSelSlot = id;
            } else if (s.state === 'selected') {
                dSlots[id].state = 'free'; dSelSlot = null;
            }
            dRender(); dOpenPanel(id);
        }

        function dOpenPanel(id) {
            const s = dSlots[id]; if (!s) return;
            document.getElementById('dPanelTitle').textContent = `Slot ${id}`;
            const vis = document.getElementById('dPanelVis');
            vis.className = 'd-slot-big ' + (s.state === 'selected' ? 'sel-bg' : s.state === 'occupied' ? 'occ-bg' : '');
            const badge = s.state === 'free' ? '<span class="d-badge fr">Available</span>' : s.state === 'selected' ? '<span class="d-badge sl">Selected</span>' : '<span class="d-badge oc">Occupied</span>';
            document.getElementById('dPanelInfo').innerHTML = `
    <div class="d-info-row"><span class="d-info-k">Slot ID</span><span class="d-info-v">${id}</span></div>
    <div class="d-info-row"><span class="d-info-k">Zone</span><span class="d-info-v">Zone ${s.zone}</span></div>
    <div class="d-info-row"><span class="d-info-k">Status</span><span class="d-info-v">${badge}</span></div>
    ${s.state === 'occupied' ? `
    <div class="d-info-row"><span class="d-info-k">Vehicle</span><span class="d-info-v">${s.plate}</span></div>
    <div class="d-info-row"><span class="d-info-k">User</span><span class="d-info-v">${s.user}</span></div>
    <div class="d-info-row"><span class="d-info-k">Since</span><span class="d-info-v">${s.since}</span></div>` : ''}
  `;
            const acts = document.getElementById('dPanelActs');
            if (s.state === 'free') acts.innerHTML = `<button class="d-act-btn primary" onclick="dReserve('${id}')">Reserve This Slot →</button>`;
            else if (s.state === 'selected') acts.innerHTML = `<button class="d-act-btn primary" onclick="dConfirm('${id}')">Confirm Reservation</button><button class="d-act-btn secondary" onclick="dClear('${id}')">Clear Selection</button>`;
            else acts.innerHTML = `<button class="d-act-btn secondary" onclick="showToast('Session details sent.','light-t')">View Session</button><button class="d-act-btn danger" onclick="dRelease('${id}')">Release Slot</button>`;
            document.getElementById('dPanel').classList.add('open');
        }
        function dClosePanel() { document.getElementById('dPanel').classList.remove('open'); }
        function dReserve(id) { dSlots[id].state = 'selected'; dSelSlot = id; dRender(); dOpenPanel(id); showToast(`Slot ${id} selected.`, 'light-t'); }
        function dConfirm(id) {
            dSlots[id].state = 'occupied'; dSlots[id].plate = dPlates[Math.floor(Math.random() * 6)];
            dSlots[id].user = dNames[Math.floor(Math.random() * 6)]; dSlots[id].since = `${new Date().getHours()}:${String(new Date().getMinutes()).padStart(2, '0')}`;
            dSelSlot = null; dRender(); dClosePanel(); showToast(`✅ Slot ${id} reserved!`, 'light-t');
        }
        function dClear(id) { dSlots[id].state = 'free'; dSelSlot = null; dRender(); dClosePanel(); showToast(`Slot ${id} cleared.`, 'light-t'); }
        function dRelease(id) { dSlots[id].state = 'free'; dSlots[id].plate = ''; dSlots[id].user = ''; dSlots[id].since = ''; dRender(); dOpenPanel(id); showToast(`Slot ${id} available.`, 'light-t'); }
        function dNav(el) { document.querySelectorAll('.d-nav-item').forEach(n => n.classList.remove('active')); el.classList.add('active'); }
        function dVehicle(v, btn) { document.querySelectorAll('.d-vtab').forEach(b => b.classList.remove('active')); btn.classList.add('active'); showToast(`Showing ${v} slots`, 'light-t'); }
        function dSearch(q) {
            document.querySelectorAll('.d-slot').forEach(s => { s.style.opacity = (!q || s.dataset.id?.toLowerCase().includes(q.toLowerCase())) ? '1' : '0.18'; });
        }

        // ════════════ TOAST ════════════
        function showToast(msg, cls = 'dark-t') {
            const t = document.getElementById('toast');
            t.textContent = msg; t.className = `toast ${cls} show`;
            setTimeout(() => t.classList.remove('show'), 2800);
        }

        // Initialize on load
        document.addEventListener('DOMContentLoaded', initDashboard);
    </script>
</body>

</html>
